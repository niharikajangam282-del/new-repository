<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color:yellow;
            display:flex;
            gap:20px;
        }
        h1{
            background-color: black;
            color:white;
            flex-grow:1;
        }
        h2{
            background-color:black;
            color:white;
            flex-grow:2;
        }
        h3{
            background-color:black;
            color:white;
            flex-grow:3;
        }
           
    </style>
</head>
<body>
    <div>
        <h1>one</h1>
        <h1>two</h1>
    </div>
</body>
</html>
